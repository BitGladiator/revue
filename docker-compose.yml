version: '3.8'

services:
  server:
    build: ./server
    container_name: revue_server
    ports:
      - '5500:5500'
    env_file:
      - ./server/.env
    environment:
      - PORT=5500
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/revue
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - postgres
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    image: postgres:16-alpine
    container_name: revue_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: revue
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: revue_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 150M

volumes:
  postgres_data:
  redis_data: