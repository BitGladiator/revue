server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: revue_server_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: revue_server
          __path__: /var/log/revue/*.log
